name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Nocturne Wallet
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Nocturne Version
      description: Check in Settings or the extension details page
      placeholder: "e.g. 1.0.8"
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Network
      description: Which network were you using?
      options:
        - Testnet
        - Preprod
        - Undeployed
        - Custom
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Brave
        - Edge
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Open DevTools (F12) → Console tab and paste any relevant errors.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (OS, wallet state, transaction details, etc.)
