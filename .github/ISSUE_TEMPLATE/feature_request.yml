name: ✨ Feature Request
description: Suggest a new feature or improvement for Nocturne Wallet
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas! Please describe the feature you'd like to see in Nocturne.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area of the wallet does this relate to?
      options:
        - Dashboard / Home
        - Send / Receive
        - DUST Protocol
        - Account Management
        - Network / Settings
        - dApp Connector
        - Security / Privacy
        - UI / UX
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe it.
      placeholder: "I'm always frustrated when..."

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any mockups, screenshots, or references that help explain the feature.
